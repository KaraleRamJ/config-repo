server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/patient_db
    username: postgres
    password: postgre

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost: 9092

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379

  redis:
    timeout: 6000

cache:
  ttl: 600 # seconds

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

resilience4j:

  circuitbreaker:
    instances:
      kafkaPublishCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5

  retry:
    instances:
      kafkaPublishRetry:
        maxAttempts: 3
        waitDuration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    circuitbreakers:
      enabled: true
